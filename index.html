<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GitHub Issues Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-gray-100">
    <section
      id="loginPage"
      class="flex justify-center items-center min-h-screen"
    >
      <div class="card bg-white shadow-xl w-96">
        <div class="card-body">
          <div class="text-center">
            <img src="assets/github-logo.png" class="w-12 mx-auto" />

            <h2 class="text-2xl font-bold mt-2">GitHub Issues Tracker</h2>

            <p class="text-gray-500 text-sm">Sign in to continue</p>
          </div>

          <input
            id="username"
            type="text"
            placeholder="Username"
            class="input input-bordered mt-4"
          />

          <input
            id="password"
            type="password"
            placeholder="Password"
            class="input input-bordered"
          />

          <button onclick="login()" class="btn btn-primary mt-4">
            Sign In
          </button>

          <p class="text-xs text-gray-500 mt-2 text-center">
            Demo: admin / admin123
          </p>
        </div>
      </div>
    </section>

    <section id="mainPage" class="hidden">
      <div class="navbar bg-white border-b-2 border-blue-500 px-8">
        <div class="flex-1 flex items-center gap-2 text-xl font-semibold">
          <img src="assets/github-logo.png" class="w-8" />

          GitHub Issues Tracker
        </div>

        <div class="flex gap-3">
          <input
            id="searchInput"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-64"
          />

          <button onclick="searchIssue()" class="btn btn-primary">
            Search
          </button>
        </div>
      </div>

      <div class="max-w-6xl mx-auto mt-8 bg-white p-6 rounded-xl shadow">
        <div class="flex gap-3">
          <button id="tabAll" onclick="loadAll()" class="btn btn-primary">
            All
          </button>

          <button id="tabOpen" onclick="loadOpen()" class="btn btn-outline">
            Open
          </button>

          <button id="tabClosed" onclick="loadClosed()" class="btn btn-outline">
            Closed
          </button>
        </div>
      </div>

      <div class="max-w-6xl mx-auto mt-6 bg-white p-6 rounded-xl shadow">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-3">
            <img src="assets/Aperture.png" class="w-10" />

            <div>
              <h2 class="text-lg font-bold">
                <span id="issueCount">0</span> Issues
              </h2>

              <p class="text-sm text-gray-500">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="flex gap-4 text-sm">
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 bg-green-500 rounded-full"></div>
              Open
            </div>

            <div class="flex items-center gap-2">
              <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
              Closed
            </div>
          </div>
        </div>
      </div>

      <div id="loading" class="flex justify-center mt-10 hidden">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>

      <div
        id="issuesContainer"
        class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-6 mb-10"
      ></div>
    </section>

    <dialog id="issueModal" class="modal">
      <div class="modal-box">
        <h3 id="modalTitle" class="font-bold text-lg"></h3>

        <p id="modalDesc" class="py-4"></p>

        <div id="modalInfo"></div>

        <div class="modal-action">
          <form method="dialog">
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="js/auth.js"></script>
    <script src="js/issues.js"></script>
    <script src="js/search.js"></script>
    <script src="js/ui.js"></script>
  </body>
</html>
